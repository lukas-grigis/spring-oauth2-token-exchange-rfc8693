server:
  port: 8000

spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        opaquetoken:
          introspection-uri: http://localhost:8080/realms/conference/protocol/openid-connect/token/introspect
          client-id: private
          client-secret: s3cret
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: private
            client-secret: s3cret
            authorization-grant-type: urn:ietf:params:oauth:grant-type:token-exchange
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/conference

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: schedule-service
              uri: http://localhost:8100
              predicates:
                - Path=/schedule/**
              filters:
                - TokenRelay=keycloak
            - id: registration-service
              uri: http://localhost:8200
              predicates:
                - Path=/registrations/**
              filters:
                - TokenRelay=keycloak

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
